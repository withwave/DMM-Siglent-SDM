<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#aaff00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SDM">
<title>Siglent SDM — Web</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/static/icon.svg">
<link rel="apple-touch-icon" href="/static/icon-128.png">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="titlebar">
    <span id="idn">connecting...</span>
    <span id="conn" class="conn-dot">●</span>
    <button id="install-btn" hidden>Install</button>
  </header>

  <main>
    <section id="lcd">
      <div id="value-area">
        <span id="value">---</span>
        <span id="unit"></span>
      </div>
      <div id="range-tag"></div>
    </section>

    <aside id="side">
      <div id="dial-area">
        <div id="dial-label">AUTO</div>
        <div id="dial">
          <select id="range-select"></select>
        </div>
        <div id="mode-tag">DCI</div>
      </div>
    </aside>

    <section id="modes">
      <button class="mode-btn" data-mode="DCI">DCI<br><small>mA</small></button>
      <button class="mode-btn" data-mode="ACI">ACI</button>
      <button class="mode-btn" data-mode="VDC">VDC</button>
      <button class="mode-btn" data-mode="VAC">VAC</button>
      <button class="mode-btn" data-mode="RES">Ω</button>
      <button class="mode-btn" data-mode="FREQ">Hz</button>
      <button class="mode-btn" data-mode="CAP">CAP</button>
    </section>

    <section id="minmax">
      <div class="mm-row">
        <span class="mm-label">↑ max</span>
        <span id="mm-max" class="mm-val">--</span>
      </div>
      <div class="mm-row">
        <span class="mm-label">↓ min</span>
        <span id="mm-min" class="mm-val">--</span>
      </div>
      <button id="mm-reset">Reset min/max</button>
    </section>

    <section id="chart-section">
      <div class="chart-header">
        <span class="chart-title">Real-time</span>
        <span id="chart-window">2 min</span>
        <div class="chart-controls">
          <select id="chart-window-select">
            <option value="30">30 s</option>
            <option value="60">1 min</option>
            <option value="120" selected>2 min</option>
            <option value="300">5 min</option>
            <option value="600">10 min</option>
          </select>
          <button id="chart-toggle" class="chart-btn active">Graph On</button>
          <button id="chart-clear" class="chart-btn">Clear</button>
        </div>
      </div>
      <canvas id="chart"></canvas>
    </section>
  </main>

  <footer id="status">
    <span id="status-text">idle</span>
  </footer>

  <script src="/static/app.js"></script>
  <script>
    // Register the PWA service worker (best-effort - the page works fine
    // without it, this just enables "Install" + offline shell caching).
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => { /* no-op */ });
    }
  </script>
</body>
</html>
